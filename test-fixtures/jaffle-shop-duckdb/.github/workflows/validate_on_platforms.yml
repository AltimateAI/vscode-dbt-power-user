name: Platform Validation

on:
  push:
    branches: [duckdb]
  pull_request:
    branches: [duckdb]

jobs:
  build-macos:
      name: Validate Getting Started works on macOS
      runs-on: macos-latest
      steps:
        - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # actions/checkout@v3
        - name: Set up Python
          uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # actions/setup-python@v4
        - name: Install uv
          uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # astral-sh/setup-uv@v5
        - name: Full Deploy Commands
          run: |
            uv sync
            source .venv/bin/activate
            which dbt
            dbt --version
            dbt debug
            dbt build
            dbt docs generate
            python -c "import duckdb; conn = duckdb.connect('jaffle_shop.duckdb'); conn.sql('select * from customers where customer_id = 42').show(); conn.close()"
          shell: bash

  build-linux:
      name: Validate Getting Started works on linux
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # actions/checkout@v3
        - name: Set up Python
          uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # actions/setup-python@v4
        - name: Install uv
          uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # astral-sh/setup-uv@v5
        - name: Full Deploy Commands
          run: |
            uv sync
            source .venv/bin/activate
            which dbt
            dbt --version
            dbt debug
            dbt build
            dbt docs generate
            python -c "import duckdb; conn = duckdb.connect('jaffle_shop.duckdb'); conn.sql('select * from customers where customer_id = 42').show(); conn.close()"
          shell: bash

  build-linux-powershell-core:
      name: Validate Getting Started works on Linux PowerShell Core
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # actions/checkout@v3
        - name: Set up Python
          uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # actions/setup-python@v4
        - name: Install uv
          uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # astral-sh/setup-uv@v5
        - name: Full Deploy Commands
          run: |
            uv sync
            uv run dbt --version
            uv run dbt debug
            uv run dbt build
            uv run dbt docs generate
            uv run python -c "import duckdb; conn = duckdb.connect('jaffle_shop.duckdb'); print(conn.sql('select * from customers where customer_id = 42').fetchall()); conn.close()"
          shell: pwsh

  build-windows-powershell:
      name: Validate Getting Started works on Windows PowerShell
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # actions/checkout@v3
        - name: Set up Python
          uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # actions/setup-python@v4
        - name: Install uv
          uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # astral-sh/setup-uv@v5
        - name: Full Deploy Commands
          run: |
            uv sync
            uv run dbt --version
            uv run dbt debug
            uv run dbt build
            uv run dbt docs generate
            uv run python -c "import duckdb; conn = duckdb.connect('jaffle_shop.duckdb'); print(conn.sql('select * from customers where customer_id = 42').fetchall()); conn.close()"
          shell: powershell

  build-windows-cmd:
      name: Validate Getting Started works on Windows cmd.exe
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # actions/checkout@v3
        - name: Set up Python
          uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # actions/setup-python@v4
        - name: Install uv
          uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # astral-sh/setup-uv@v5
        - name: Full Deploy Commands
          run: |
            uv sync
            .venv\Scripts\activate.bat
            where dbt
            dbt --version
            dbt debug
            dbt build
            dbt docs generate
            python -c "import duckdb; conn = duckdb.connect('jaffle_shop.duckdb'); conn.sql('select * from customers where customer_id = 42').show(); conn.close()"
          shell: cmd
