services:
  code-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    volumes:
      - ..:/home/coder/extension-src:ro
      - ${DBT_PROJECT_PATH:-/home/coder/jaffle_shop_duckdb}:/home/coder/project
    restart: unless-stopped
