services:
  code-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    volumes:
      - ..:/home/coder/extension-src:ro
      - ${DBT_PROJECT_PATH:-/home/coder/jaffle-shop-duckdb}:/home/coder/project
      - ${ALTIMATE_CREDENTIALS_FILE:-/dev/null}:/home/coder/.altimate-host/altimate.json:ro
    restart: unless-stopped
