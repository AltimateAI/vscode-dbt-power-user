name: Install/Update Matrix

on:
  pull_request:
    # "**" matches multi-segment base branches (e.g. feat/x); "*" would not.
    branches: ["**"]
  push:
    tags: ["*"]
  schedule:
    - cron: "30 6 * * *" # daily, 06:30 UTC (offset from vsix-smoke's 06:00)
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: install-update-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compute the cell matrix. Upgrade baselines are data-driven from the live
  # App Insights version distribution when APPINSIGHTS_API_KEY is set; otherwise
  # a hardcoded fallback is used (fork PRs / telemetry outage).
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      baselines: ${{ steps.plan.outputs.baselines }}
      source: ${{ steps.plan.outputs.source }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build matrix (data-driven baselines)
        id: plan
        env:
          APPINSIGHTS_API_KEY: ${{ secrets.APPINSIGHTS_API_KEY }}
        run: python3 test-matrix/build-matrix.py >> "$GITHUB_OUTPUT"
      - name: Echo chosen baselines
        run: echo "source=${{ steps.plan.outputs.source }} baselines=${{ steps.plan.outputs.baselines }}"

  # Build one platform-specific VSIX per OS (native deps make a linux vsix
  # uninstallable on mac/windows), each on its matching runner.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: linux-x64 }
          - { os: macos-latest, target: darwin-arm64 }
          - { os: windows-latest, target: win32-x64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/common-build
        with:
          vsce-target: ${{ matrix.target }}
      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }} -o pu-${{ matrix.target }}.vsix
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: pu-${{ matrix.target }}.vsix
          retention-days: 3

  vscode-cells:
    needs: [plan, build]
    strategy:
      fail-fast: false
      # Cells (incl. data-driven upgrade baselines) come from the plan job.
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps + compile test suite
        run: |
          npm ci
          npm run compile
      - uses: actions/download-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run cell
        shell: bash
        run: |
          set -e
          eval "$(bash test-matrix/setup-dbt-env.sh)"
          vsixes=( pu-*.vsix ); VSIX="${vsixes[0]}"
          OUT="result-${{ matrix.osl }}-${{ matrix.vscode }}-${{ matrix.mode }}-${{ matrix.from }}.json"
          ARGS=(--mode "${{ matrix.mode }}" --target "$PWD/$VSIX" --vscode-version "${{ matrix.vscode }}" --out "$OUT")
          [ -n "${{ matrix.from }}" ] && ARGS+=(--from "${{ matrix.from }}")
          if [ "${{ matrix.osl }}" = "linux" ]; then
            sudo apt-get update && sudo apt-get install -y xvfb
            xvfb-run -a node test-matrix/vscode-cell.mjs "${ARGS[@]}" || true
          else
            node test-matrix/vscode-cell.mjs "${ARGS[@]}" || true
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.osl }}-${{ matrix.vscode }}-${{ matrix.mode }}-${{ matrix.from }}
          path: result-*.json
          if-no-files-found: warn

  codeserver-cell:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vsix-linux-x64
      - name: code-server fresh + upgrade
        run: |
          vsixes=( pu-*.vsix ); VSIX="${vsixes[0]}"
          bash test-matrix/codeserver-cell.sh --mode fresh   --vsix-file "$PWD/$VSIX" --out result-codeserver-fresh.json || true
          bash test-matrix/codeserver-cell.sh --mode upgrade --from 0.61.4 --vsix-file "$PWD/$VSIX" --out result-codeserver-upgrade.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: result-codeserver
          path: result-codeserver-*.json
          if-no-files-found: warn

  # Non-blocking fork lane: Cursor (Anysphere VSCode fork), Linux only. Drives
  # the extracted Cursor AppImage headlessly (xvfb) — @vscode/test-electron can't
  # target a fork. A failure here renders as ⚠️ and never blocks merge/release.
  cursor-cell:
    needs: [plan, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Fresh install + one representative upgrade (highest live baseline).
        include:
          - { mode: fresh, from: "" }
          - { mode: upgrade, from: "" } # 'from' filled from plan baselines at run time
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps + compile test suite
        run: |
          npm ci
          npm run compile
      - uses: actions/download-artifact@v4
        with:
          name: vsix-linux-x64
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Cursor cell
        shell: bash
        env:
          BASELINES: ${{ needs.plan.outputs.baselines }}
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y xvfb
          eval "$(bash test-matrix/setup-dbt-env.sh)"
          eval "$(bash test-matrix/provision/cursor.sh)"   # sets CURSOR_BIN, CURSOR_VERSION
          echo "Provisioned Cursor $CURSOR_VERSION at $CURSOR_BIN"
          vsixes=( pu-*.vsix ); VSIX="${vsixes[0]}"
          MODE="${{ matrix.mode }}"
          # Representative upgrade baseline = highest version from the plan job.
          FROM=""
          if [ "$MODE" = "upgrade" ]; then
            FROM="$(printf '%s' "$BASELINES" | tr ',' '\n' | tail -1)"
          fi
          OUT="result-cursor-${MODE}-${FROM}.json"
          ARGS=(--bin "$CURSOR_BIN" --mode "$MODE" --target "$PWD/$VSIX" --out "$OUT")
          [ -n "$FROM" ] && ARGS+=(--from "$FROM")
          # Hard outer guard: `timeout -s KILL` caps wall time even if the whole
          # Cursor process tree wedges (the node-level backstop can't help if a
          # synchronous child blocks the event loop). After it returns, reap any
          # straggler Cursor/Xvfb processes so nothing keeps the job alive.
          timeout -s KILL 12m xvfb-run -a node test-matrix/cursor-cell.mjs "${ARGS[@]}" || true
          pkill -9 -f 'squashfs-root|cursor|Xvfb' 2>/dev/null || true
          if [ ! -f "$OUT" ]; then
            printf '{"runtime":"cursor","os":"linux","scenario":"%s","from":%s,"to":"pr-build","install_ok":false,"deps_resolved":{},"activation_ok":false,"dbt_flow_ok":false,"status":"fail","reason":"cell wedged — killed by outer timeout","duration_s":720,"log_artifact":"%s"}\n' \
              "$MODE" "$([ -n "$FROM" ] && echo "\"$FROM\"" || echo null)" "$OUT" > "$OUT"
          fi
          echo "=== RESULT_JSON ==="; cat "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: result-cursor-${{ matrix.mode }}
          path: result-cursor-*.json
          if-no-files-found: warn

  aggregate:
    needs: [vscode-cells, codeserver-cell, cursor-cell]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: results
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Aggregate
        id: agg
        run: |
          set +e
          python3 test-matrix/aggregate.py --results-dir results --out-dir agg \
            --target "${{ github.event_name == 'pull_request' && 'pr-build' || 'latest' }}" \
            --trigger "${{ github.event_name }}"
          code=$?
          echo "blocking_failed=$([ $code -ne 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: matrix-report
          path: agg/
      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '<!-- install-update-matrix -->\n' + fs.readFileSync('agg/matrix.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body.includes('<!-- install-update-matrix -->'));
            if (existing) await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
      - name: Set commit status (blocking gate)
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr && pr.head.repo.full_name !== context.payload.repository.full_name) {
              core.info('fork PR — cannot set commit status, skipping');
              return;
            }
            const failed = '${{ steps.agg.outputs.blocking_failed }}' === 'true';
            const sha = pr ? pr.head.sha : context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha,
              state: failed ? 'failure' : 'success',
              description: failed ? 'Blocking-lane cell failed' : 'Install/Update matrix green',
              context: 'Install/Update Matrix',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
      - name: Slack notify
        if: always()
        env:
          # Prefer a matrix-specific webhook if configured; otherwise reuse the
          # repo's existing SLACK_WEBHOOK_URL secret so notifications work today.
          SLACK_WEBHOOK_URL: ${{ secrets.MATRIX_SLACK_WEBHOOK || secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' --data @agg/slack.json "$SLACK_WEBHOOK_URL" || echo "slack post failed (non-fatal)"
          else
            echo "no Slack webhook secret set; skipping Slack notification"
          fi
      - name: Fail job if blocking lane failed
        if: steps.agg.outputs.blocking_failed == 'true'
        run: |
          echo "::error::Blocking-lane matrix cell(s) failed"
          exit 1
